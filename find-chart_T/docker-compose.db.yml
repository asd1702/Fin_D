services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: find-chart-timescaledb
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: find_chart
      POSTGRES_USER: find_chart
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-1234}
      TZ: Asia/Seoul
    volumes:
      - find_chart_timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U find_chart -d find_chart"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  find_chart_timescale_data:
